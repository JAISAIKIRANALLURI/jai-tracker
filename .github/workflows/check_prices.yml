name: Check Flight Prices

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (~56 checks per route over 14 days, fits SerpAPI free tier)
  workflow_dispatch:          # also runnable manually for testing

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check prices
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/price_checker.py

      - name: Commit updated price data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "prices: update route data [skip ci]"
          file_pattern: data/routes.json
